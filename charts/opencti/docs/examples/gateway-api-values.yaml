# Gateway API test values for local OrbStack cluster
# NOT for production use - secrets are hardcoded for convenience

fullnameOverride: opencti-gw-test

env:
  APP__ADMIN__EMAIL: admin@opencti.io
  APP__BASE_PATH: "/"
  APP__TELEMETRY__METRICS__ENABLED: false
  APP__GRAPHQL__PLAYGROUND__ENABLED: true
  APP__GRAPHQL__PLAYGROUND__FORCE_DISABLED_INTROSPECTION: false

  ## OPENSEARCH
  ELASTICSEARCH__ENGINE_SELECTOR: opensearch
  ELASTICSEARCH__URL: http://opencti-gw-test-opensearch:9200

  ## STORAGE
  MINIO__ENDPOINT: opencti-gw-test-minio
  MINIO__ACCESS_KEY: minio
  MINIO__SECRET_KEY: minio123456

  ## MESSAGE QUEUE
  RABBITMQ__HOSTNAME: opencti-gw-test-rabbitmq
  RABBITMQ__PORT_MANAGEMENT: 15672
  RABBITMQ__PORT: 5672
  RABBITMQ__USERNAME: user
  RABBITMQ__PASSWORD: changeme

  ## CACHE
  REDIS__HOSTNAME: opencti-gw-test-redis
  REDIS__MODE: single
  REDIS__PORT: 6379

secrets:
  - name: credentials
    data:
      APP__ADMIN__PASSWORD: iraLehfJu1NRnQgwIBeH
      APP__ADMIN__TOKEN: b1976749-8a53-4f49-bf04-cafa2a3458c1
      APP__HEALTH_ACCESS_KEY: f93747ff-2ea1-4717-900c-9df20b8e4429
      APP__ENCRYPTION_KEY: ht7eLhv06KCwDzlsDQkzup3fnGEMkx1G1MtV5XJb5+c=

envFromSecrets:
  APP__ADMIN__PASSWORD:
    name: opencti-gw-test-credentials
    key: APP__ADMIN__PASSWORD
  APP__ADMIN__TOKEN:
    name: opencti-gw-test-credentials
    key: APP__ADMIN__TOKEN
  APP__HEALTH_ACCESS_KEY:
    name: opencti-gw-test-credentials
    key: APP__HEALTH_ACCESS_KEY
  APP__ENCRYPTION_KEY:
    name: opencti-gw-test-credentials
    key: APP__ENCRYPTION_KEY

readyChecker:
  enabled: true
  retries: 30
  timeout: 10
  services:
    - name: opensearch
      port: 9200
    - name: minio
      port: 9000
    - name: rabbitmq
      port: 5672
    - name: redis
      port: 6379

livenessProbe:
  enabled: false

readinessProbe:
  enabled: false

startupProbe:
  enabled: false

service:
  type: ClusterIP
  port: 80
  targetPort: 4000

##
# GATEWAY API
ingress:
  enabled: false

gateway:
  enabled: true
  create: true
  className: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.192.168.139.2.nip.io"
  hostnames:
    - opencti.192.168.139.2.nip.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

##
# RESOURCES
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

##
# WORKER
worker:
  enabled: true

  readyChecker:
    enabled: true
    retries: 30
    timeout: 10

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

##
# OPENSEARCH
opensearch:
  enabled: true
  fullnameOverride: opencti-gw-test-opensearch

  nodeGroup: ""
  opensearchJavaOpts: "-Xmx512M -Xms512M"
  singleNode: true

  config:
    opensearch.yml: |
      plugins.security.disabled: true

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  persistence:
    enabled: false

##
# MINIO
minio:
  fullnameOverride: opencti-gw-test-minio

  rootUser: minio
  rootPassword: minio123456

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

  persistence:
    enabled: false

  mode: standalone

##
# RABBITMQ
rabbitmq:
  fullnameOverride: opencti-gw-test-rabbitmq

  auth:
    username: user
    password: changeme
    erlangCookie: test-erlang-cookie-localonly

  clustering:
    enabled: false

  networkPolicy:
    enabled: false

  persistence:
    enabled: false

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

##
# REDIS
redis:
  fullnameOverride: opencti-gw-test-redis

  architecture: standalone

  auth:
    enabled: false

  master:
    persistence:
      enabled: false
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
