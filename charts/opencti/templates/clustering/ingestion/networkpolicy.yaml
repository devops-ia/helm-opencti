{{- if eq .Values.deploymentType "clustering" }}
{{- if .Values.clustering.ingestion.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "opencti.fullname" . }}-server
  labels:
    {{- include "opencti.ingestionLabels" . | nindent 4 }}
spec:
  {{- if and (not .Values.clustering.ingestion.networkPolicy.policyTypes) (not .Values.clustering.ingestion.networkPolicy.ingress) (not .Values.clustering.ingestion.networkPolicy.egress) }}
  podSelector: {}
  {{- else }}
  podSelector:
    matchLabels:
      {{- include "opencti.selectorIngestionLabels" . | nindent 6 }}
  {{- end }}

  {{- if .Values.clustering.ingestion.networkPolicy.policyTypes }}
  {{- with .Values.clustering.ingestion.networkPolicy.policyTypes }}
  policyTypes:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- else }}
  policyTypes:
    - Ingress
    - Egress
  {{- end }}

  {{- if .Values.clustering.ingestion.networkPolicy.ingress }}
  {{- with .Values.clustering.ingestion.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- else }}
  ingress:
  - {}
  {{- end }}

  {{- if .Values.clustering.ingestion.networkPolicy.egress }}
  {{- with .Values.clustering.ingestion.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- else }}
  egress:
  - {}
  {{- end }}

{{- end }}
{{- end }}
