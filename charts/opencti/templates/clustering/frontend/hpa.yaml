{{- if eq .Values.deploymentType "clustering" }}
{{- if .Values.clustering.frontend.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "opencti.fullname" . }}-frontend
  labels:
    {{- include "opencti.frontendLabels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "opencti.fullname" . }}-frontend
  minReplicas: {{ .Values.clustering.frontend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.clustering.frontend.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.clustering.frontend.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.clustering.frontend.worker.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.clustering.frontend.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.clustering.frontend.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
