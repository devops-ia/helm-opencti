{{- if eq .Values.deploymentType "clustering" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencti.fullname" . }}-frontend
  labels:
    {{- include "opencti.frontendLabels" . | nindent 4 }}
spec:
  {{- if not .Values.clustering.frontend.autoscaling.enabled }}
  replicas: {{ .Values.clustering.frontend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "opencti.selectorFrontendLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.clustering.frontend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "opencti.selectorFrontendLabels" . | nindent 8 }}
        {{- with .Values.clustering.frontend.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.clustering.frontend.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.clustering.frontend.imagePullSecrets | nindent 8 }}
      {{- else if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "opencti.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.clustering.frontend.podSecurityContext | nindent 8 }}
      initContainers:
      {{- if .Values.clustering.frontend.readyChecker.enabled }}
        {{- range $service := .Values.clustering.frontend.readyChecker.services }}
        - name: ready-checker-{{ $service.name }}
          {{- if $.Values.global.imageRegistry }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $.Values.clustering.frontend.readyChecker.repository }}:{{ $.Values.clustering.frontend.readyChecker.tag }}"
          {{- else }}
          image: {{ $.Values.clustering.frontend.readyChecker.repository }}:{{ $.Values.clustering.frontend.readyChecker.tag }}
          {{- end }}
          imagePullPolicy: {{ $.Values.clustering.frontend.readyChecker.pullPolicy }}
          command:
            - 'sh'
            - '-c'
            - |
              RETRY=0;
              until [ $RETRY -eq {{ $.Values.clustering.frontend.readyChecker.retries }} ];
              do
                ADDRESS="{{ if $service.address }}{{ $service.address }}{{ else }}{{ $.Values.clustering.frontend.fullnameOverride | default $.Release.Name }}-{{ $service.name }}{{ end }}";
                if nc -zv $ADDRESS {{ $service.port }}; then
                  echo "Service {{ $service.name }} with address $ADDRESS:{{ $service.port }} is ready";
                  exit 0;
                fi;
                echo "[$RETRY/{{ $.Values.clustering.frontend.readyChecker.retries }}] waiting for service {{ $service.name }} with address $ADDRESS:{{ $service.port }} to become ready";
                sleep {{ $.Values.clustering.frontend.readyChecker.timeout }};
                RETRY=$(($RETRY + 1));
                if [ $RETRY -eq {{ $.Values.clustering.frontend.readyChecker.retries }} ]; then
                  echo "Service {{ $service.name }} with address $ADDRESS:{{ $service.port }} is not ready";
                  exit 1;
                fi;
              done
          {{- end }}
        {{- end }}
        {{- with .Values.clustering.frontend.initContainers }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}-server
          securityContext:
            {{- toYaml .Values.clustering.frontend.securityContext | nindent 12 }}
          {{- if .Values.global.imageRegistry }}
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.clustering.frontend.image.repository }}:{{ .Values.clustering.frontend.image.tag | default .Chart.AppVersion }}"
          {{- else }}
          image: "{{ .Values.clustering.frontend.image.repository }}:{{ .Values.clustering.frontend.image.tag | default .Chart.AppVersion }}"
          {{- end }}
          imagePullPolicy: {{ .Values.clustering.frontend.image.pullPolicy }}
          {{- with .Values.clustering.frontend.command }}
          command: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.clustering.frontend.args }}
          args: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.clustering.frontend.service.targetPort | default .Values.clustering.frontend.service.port }}
              protocol: TCP
            {{- range $port := .Values.clustering.frontend.service.extraPorts }}
            - name: {{ $port.name }}
              containerPort: {{ $port.targetPort }}
              protocol: TCP
            {{- end }}
            {{- if .Values.clustering.frontend.serviceMonitor.enabled }}
            - name: metrics
              containerPort: {{ .Values.clustering.frontend.env.APP__TELEMETRY__METRICS__EXPORTER_PROMETHEUS | default 14269 }}
              protocol: TCP
            {{- end }}
          lifecycle:
            {{- with .Values.clustering.frontend.lifecycle }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.clustering.frontend.livenessProbe.enabled }}
          livenessProbe:
            {{- if .Values.clustering.frontend.livenessProbeCustom }}
            {{- toYaml .Values.clustering.frontend.livenessProbeCustom | nindent 12 }}
            {{- else }}
            httpGet:
              path: {{ .Values.clustering.frontend.service.healthPath | default (printf "/health?health_access_key=%s" .Values.clustering.frontend.env.APP__HEALTH_ACCESS_KEY) | quote }}
              port: {{ .Values.clustering.frontend.service.targetPort | default .Values.clustering.frontend.service.port }}
            failureThreshold: {{ .Values.clustering.frontend.livenessProbe.failureThreshold }}
            initialDelaySeconds: {{ .Values.clustering.frontend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.clustering.frontend.livenessProbe.periodSeconds }}
            successThreshold: {{ .Values.clustering.frontend.livenessProbe.successThreshold }}
            timeoutSeconds: {{ .Values.clustering.frontend.livenessProbe.timeoutSeconds }}
            {{- end }}
          {{- end }}
          {{- if .Values.clustering.frontend.readinessProbe.enabled }}
          readinessProbe:
            {{- if .Values.clustering.frontend.readinessProbeCustom }}
            {{- toYaml .Values.clustering.frontend.readinessProbeCustom | nindent 12 }}
            {{- else }}
            httpGet:
              path: {{ .Values.clustering.frontend.service.healthPath | default (printf "/health?health_access_key=%s" .Values.clustering.frontend.env.APP__HEALTH_ACCESS_KEY) | quote }}
              port: {{ .Values.clustering.frontend.service.targetPort | default .Values.clustering.frontend.service.port }}
            failureThreshold: {{ .Values.clustering.frontend.readinessProbe.failureThreshold }}
            initialDelaySeconds: {{ .Values.clustering.frontend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.clustering.frontend.readinessProbe.periodSeconds }}
            successThreshold: {{ .Values.clustering.frontend.readinessProbe.successThreshold }}
            timeoutSeconds: {{ .Values.clustering.frontend.readinessProbe.timeoutSeconds }}
            {{- end }}
          {{- end }}
          {{- if .Values.clustering.frontend.startupProbe.enabled }}
          startupProbe:
            {{- if .Values.clustering.frontend.startupProbeCustom }}
            {{- toYaml .Values.clustering.frontend.startupProbeCustom | nindent 12 }}
            {{- else }}
            httpGet:
              path: {{ .Values.clustering.frontend.service.healthPath | default (printf "/health?health_access_key=%s" .Values.clustering.frontend.env.APP__HEALTH_ACCESS_KEY) | quote }}
              port: {{ .Values.clustering.frontend.service.targetPort | default .Values.clustering.frontend.service.port }}
            failureThreshold: {{ .Values.clustering.frontend.startupProbe.failureThreshold }}
            initialDelaySeconds: {{ .Values.clustering.frontend.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.clustering.frontend.startupProbe.periodSeconds }}
            successThreshold: {{ .Values.clustering.frontend.startupProbe.successThreshold }}
            timeoutSeconds: {{ .Values.clustering.frontend.startupProbe.timeoutSeconds }}
            {{- end }}
          {{- end }}
          envFrom:
            {{- if .Values.clustering.frontend.envFromFiles }}
            {{- tpl (toYaml .Values.clustering.frontend.envFromFiles) . | nindent 12 }}
            {{- end }}
          env:
            # Variables from secrets have precedence
            {{- $envList := dict -}}
            {{- if .Values.clustering.frontend.envFromSecrets }}
            {{- range $key, $value := .Values.clustering.frontend.envFromSecrets }}
            {{- if not (hasKey $envList $key) }}
            - name: {{ $key | upper }}
              valueFrom:
                secretKeyRef:
                  name: {{ $value.name }}
                  key: {{ $value.key | default $key }}
            {{- $_ := set $envList $key true }}
            {{- end }}
            {{- end }}
            {{- end }}
            # Variables from configmap have precedence
            {{- if .Values.clustering.frontend.envFromConfigMap }}
            {{- range $key, $value := .Values.clustering.frontend.envFromConfigMap }}
            {{- if not (hasKey $envList $key) }}
            - name: {{ $key | upper }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $value.name }}
                  key: {{ $value.key | default $key }}
            {{- $_ := set $envList $key true }}
            {{- end }}
            {{- end }}
            {{- end }}
            # Add variables in plain text if they were not already added from secrets
            {{- if .Values.clustering.frontend.env }}
            {{- range $key, $value := .Values.clustering.frontend.env }}
            {{- if not (hasKey $envList $key) }}
            - name: {{ $key | upper }}
              value: {{ $value | quote }}
            {{- $_ := set $envList $key true }}
            {{- end }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.clustering.frontend.resources | nindent 12 }}
          {{- with .Values.clustering.frontend.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      terminationGracePeriodSeconds: {{ .Values.clustering.frontend.terminationGracePeriodSeconds }}
      {{- with .Values.clustering.frontend.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clustering.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clustering.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clustering.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clustering.frontend.topologySpreadConstraints }}
      {{- $_ := include "opencti.patchTopologySpreadConstraintsFrontend" $ }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
