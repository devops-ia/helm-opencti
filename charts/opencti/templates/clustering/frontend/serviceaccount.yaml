{{- if eq .Values.deploymentType "clustering" }}
{{- if .Values.clustering.frontend.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opencti.serviceAccountName" . }}
  labels:
    {{- include "opencti.frontendLabels" . | nindent 4 }}
  {{- with .Values.clustering.frontend.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.clustering.frontend.serviceAccount.automountServiceAccountToken | default "false" }}
{{- end }}
{{- end }}
