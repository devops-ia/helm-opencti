{{- if .Values.env.WORKER__TELEMETRY__ENABLED }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencti.fullname" . }}-worker
  labels:
    {{- include "opencti.workerLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: metrics
      port: {{ .Values.env.WORKER__PROMETHEUS_TELEMETRY__PORT | default 14270 }}
      targetPort: {{ .Values.env.WORKER__PROMETHEUS_TELEMETRY__PORT | default 14270 }}
      protocol: TCP
  selector:
    {{- include "opencti.selectorWorkerLabels" . | nindent 4 }}
{{- end }}
